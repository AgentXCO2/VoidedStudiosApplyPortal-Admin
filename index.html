<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voided Admin Panel</title>

<style>
body{
margin:0;
font-family:monospace;
background:#050507;
color:white;
}

header{
padding:15px;
text-align:center;
border-bottom:1px solid #222;
}

.panel{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
gap:10px;
}

.card{
background:#0f0f14;
border:1px solid #222;
padding:15px;
border-radius:10px;
width:420px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
background:#000;
border:1px solid #333;
color:white;
border-radius:6px;
font-family:monospace;
}

button{
width:100%;
padding:10px;
margin-top:8px;
background:#7c3aed;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.app{
background:#111;
padding:10px;
border-radius:8px;
margin-top:10px;
border:1px solid #222;
}
</style>
</head>

<body>

<header>
<h2>VOIDED STUDIOS // ADMIN PANEL</h2>
</header>

<div class="panel">

<button onclick="googleLogin()">Login with Google</button>

<div class="card">
<input id="adminPass" type="password" placeholder="Enter Admin Password">
<button onclick="unlock()">Unlock Panel</button>
</div>

<div id="apps"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
getAuth,
signInWithPopup,
GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyCic_ne2ZWsYZeTFX-2fJPCcFXJlqzLEW4",
authDomain: "voided-studios-apply-portal.firebaseapp.com",
projectId: "voided-studios-apply-portal",
storageBucket: "voided-studios-apply-portal.firebasestorage.app",
messagingSenderId: "385790292991",
appId: "1:385790292991:web:a4a10cb5781c107151adca"
};

/* INIT */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

/* STATE */
const ADMIN_PASSWORD = "VoidedStudios.Agent";
let unlocked = false;
let applications = [];

/* FIRESTORE LIVE LISTENER */
onSnapshot(collection(db,"applications"), (snap)=>{
applications = snap.docs.map(d => ({
id: d.id,
...d.data()
}));
render();
});

/* GOOGLE LOGIN */
window.googleLogin = async function(){
try{
await signInWithPopup(auth, provider);
alert("Google Login Successful");
}catch(e){
alert("Login Failed: " + e.message);
}
};

/* UNLOCK PANEL */
window.unlock = function(){

const pass = document.getElementById("adminPass").value;

if(pass === ADMIN_PASSWORD){
unlocked = true;
alert("Panel Unlocked");
render();
}else{
alert("Wrong Password");
}

};

/* SAFE RENDER (FIXED) */
function render(){

const box = document.getElementById("apps");

if(!applications.length){
box.innerHTML = "<p>No applications found.</p>";
return;
}

box.innerHTML = applications.map(a=>{

const name = a.realname ?? "Unknown";
const role = a.role ?? "No Role";
const status = a.status ?? "Pending";

return `
<div class="app">
<b>Name:</b> ${name}<br>
<b>Role:</b> ${role}<br>
<b>Status:</b> ${status}<br>

${unlocked ? `
<button onclick="setStatus('${a.id}','accepted')">Accept</button>
<button onclick="setStatus('${a.id}','declined')">Decline</button>
` : `<small>Locked</small>`}

</div>
`;

}).join("");

}

/* UPDATE STATUS */
window.setStatus = async function(id,status){
await updateDoc(doc(db,"applications",id),{
status: status
});
};

</script>

</body>
</html>
