<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voided Studios Admin</title>

<style>
body{
margin:0;
font-family:monospace;
background:#050507;
color:white;
}

header{
padding:15px;
text-align:center;
border-bottom:1px solid #222;
}

.panel{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.card{
background:#0f0f14;
border:1px solid #222;
padding:15px;
border-radius:10px;
width:420px;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
background:#000;
border:1px solid #333;
color:white;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
background:#7c3aed;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.app{
background:#111;
padding:10px;
border-radius:8px;
margin-top:10px;
border:1px solid #222;
}
</style>
</head>

<body>

<header>
<h2>VOIDED STUDIOS // ADMIN PANEL</h2>
</header>

<div class="panel">

<button onclick="googleLogin()">Login with Google</button>

<div class="card">
<input id="adminPass" type="password" placeholder="Enter Admin Password">
<button onclick="unlock()">Unlock Panel</button>
</div>

<div id="apps"></div>

</div>

<!-- FIREBASE CDN (IMPORTANT FIX) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
getAuth,
signInWithPopup,
GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyCic_ne2ZWsYZeTFX-2fJPCcFXJlqzLEW4",
authDomain: "voided-studios-apply-portal.firebaseapp.com",
projectId: "voided-studios-apply-portal",
storageBucket: "voided-studios-apply-portal.firebasestorage.app",
messagingSenderId: "385790292991",
appId: "1:385790292991:web:a4a10cb5781c107151adca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

let unlocked = false;

const ADMIN_PASSWORD = "VoidedStudios.Agent";

/* GOOGLE LOGIN */
window.googleLogin = async function(){
try{
await signInWithPopup(auth, provider);
alert("Google Login Successful");
}catch(e){
alert("Login failed: " + e.message);
}
}

/* FIXED UNLOCK FUNCTION */
window.unlock = function(){

const input = document.getElementById("adminPass").value;

if(input === ADMIN_PASSWORD){
unlocked = true;
loadApps();
alert("Panel Unlocked");
}else{
alert("Wrong Password");
}

}

/* LOAD APPLICATIONS */
function loadApps(){

onSnapshot(collection(db,"applications"), (snap)=>{

if(!unlocked) return;

const apps = snap.docs.map(d => ({id:d.id,...d.data()}));

document.getElementById("apps").innerHTML = apps.map(a=>`
<div class="app">
<b>${a.roblox}</b> (${a.realname})<br>
Role: ${a.role}<br>
Status: ${a.status}<br>

<button onclick="setStatus('${a.id}','accepted')">Accept</button>
<button onclick="setStatus('${a.id}','declined')">Decline</button>
</div>
`).join("");

});

}

/* UPDATE STATUS */
window.setStatus = async function(id,status){
await updateDoc(doc(db,"applications",id),{status});
}

</script>

</body>
</html>
